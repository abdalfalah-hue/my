name: GrokMurphy Auto Backtester

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Trading Symbol'
        required: false
        default: 'XAUUSD'
      period:
        description: 'Timeframe'
        required: false
        default: 'H1'

env:
  MT5_INSTALL_PATH: 'C:\MT5'
  REPORT_PATH: 'C:\MT5\MQL5\Files\GrokReport.html'

jobs:
  backtest:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Configuration
        run: |
          if (-Not (Test-Path "backtest_config.ini")) {
            Write-Error "Configuration file not found!"
            exit 1
          }
          Write-Output "✓ Configuration file verified"
        shell: powershell

      - name: Download MetaTrader 5
        run: |
          Write-Output "Downloading MetaTrader 5..."
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "http://www.metatrader5.com/download/mt5setup.exe" `
            -OutFile "mt5setup.exe" -TimeoutSec 300
          Write-Output "✓ Download completed"
        shell: powershell

      - name: Install MetaTrader 5
        run: |
          Write-Output "Installing MT5..."
          & "mt5setup.exe" /invisible /u /target:"$env:MT5_INSTALL_PATH"
          Start-Sleep -Seconds 30
          Write-Output "✓ Installation completed"
        shell: powershell

      - name: Run Backtest
        run: |
          Write-Output "Starting backtest..."
          & "C:\MT5\terminal64.exe" /config:backtest_config.ini /exit
          Write-Output "✓ Backtest completed"
        shell: powershell

      - name: Upload Report
        uses: actions/upload-artifact@v3
        with:
          name: GrokMurphy-Report
          path: ${{ env.REPORT_PATH }}
          retention-days: 30

      - name: Report Status
        if: always()
        run: |
          if (Test-Path "$env:REPORT_PATH") {
            Write-Output "✓ Report successfully generated"
          } else {
            Write-Output "✗ Report not found"
          }
        shell: powershell
