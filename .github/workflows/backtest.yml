name: GrokMurphy Auto Backtester

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Trading Symbol'
        required: false
        default: 'XAUUSD'

env:
  MT5_PATH: 'C:\MT5'
  REPORT_PATH: 'C:\MT5\MQL5\Files\GrokReport.html'

jobs:
  backtest:
    runs-on: windows-latest
    timeout-minutes: 120
    
    steps:
      # ✅ ACTION VERSIONS UPDATED - No Deprecated Actions
      
      - name: Checkout Code
        uses: actions/checkout@v4  # ✅ Latest version
        with:
          fetch-depth: 1

      - name: Verify Configuration
        run: |
          if (-Not (Test-Path "backtest_config.ini")) {
            Write-Error "backtest_config.ini not found!"
            exit 1
          }
          Write-Output "✓ Configuration verified"
        shell: powershell

      - name: Cache MetaTrader 5
        uses: actions/cache@v4  # ✅ Latest version (was v2)
        id: mt5-cache
        with:
          path: C:\MT5
          key: mt5-windows-${{ hashFiles('.github/workflows/backtest.yml') }}
          restore-keys: mt5-windows-

      - name: Download MetaTrader 5
        if: steps.mt5-cache.outputs.cache-hit != 'true'
        run: |
          Write-Output "Downloading MT5..."
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "http://www.metatrader5.com/download/mt5setup.exe" `
            -OutFile "mt5setup.exe" -TimeoutSec 300
          if (-Not (Test-Path "mt5setup.exe")) {
            throw "MT5 download failed"
          }
        shell: powershell

      - name: Install MetaTrader 5
        if: steps.mt5-cache.outputs.cache-hit != 'true'
        run: |
          Write-Output "Installing MT5..."
          & "mt5setup.exe" /invisible /u /target:"$env:MT5_PATH"
          Start-Sleep -Seconds 30
          if (-Not (Test-Path "$env:MT5_PATH\terminal64.exe")) {
            throw "MT5 installation failed"
          }
        shell: powershell

      - name: Run Backtest
        run: |
          Write-Output "Starting backtest..."
          & "$env:MT5_PATH\terminal64.exe" /config:backtest_config.ini /exit
        shell: powershell
        timeout-minutes: 90

      - name: Verify Results
        run: |
          if (Test-Path "$env:REPORT_PATH") {
            Write-Output "✓ Report generated"
          } else {
            throw "Report not found"
          }
        shell: powershell

      - name: Upload Report
        uses: actions/upload-artifact@v4  # ✅ Latest version (was v2/v3)
        if: always()
        with:
          name: GrokMurphy-Report
          path: ${{ env.REPORT_PATH }}
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          Write-Output "═══════════════════════════════════"
          Write-Output "  BACKTEST COMPLETE"
          Write-Output "═══════════════════════════════════"
