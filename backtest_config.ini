name: GrokMurphy Auto Backtester

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Trading Symbol'
        required: false
        default: 'XAUUSD'
      period:
        description: 'Timeframe (M1, M5, M15, M30, H1, H4, D1, W1, MN1)'
        required: false
        default: 'H1'

env:
  MT5_INSTALL_PATH: 'C:\MT5'
  MT5_TERMINAL_EXE: 'C:\MT5\terminal64.exe'
  REPORT_NAME: 'GrokReport.html'
  REPORT_PATH: 'C:\MT5\MQL5\Files\GrokReport.html'

jobs:
  backtest:
    runs-on: windows-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check Configuration File
        run: |
          if (-Not (Test-Path "backtest_config.ini")) {
            Write-Error "Configuration file 'backtest_config.ini' not found!"
            exit 1
          }
          Write-Output "Configuration file found:"
          Get-Content backtest_config.ini
        shell: powershell

      - name: Cache MetaTrader 5
        uses: actions/cache@v4
        id: mt5-cache
        with:
          path: C:\MT5
          key: mt5-windows-latest-${{ hashFiles('.github/workflows/backtest.yml') }}
          restore-keys: |
            mt5-windows-latest-

      - name: Download MetaTrader 5
        if: steps.mt5-cache.outputs.cache-hit != 'true'
        run: |
          Write-Output "Downloading MetaTrader 5..."
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "http://www.metatrader5.com/download/mt5setup.exe" -OutFile "mt5setup.exe" -TimeoutSec 300
          
          if (-Not (Test-Path "mt5setup.exe")) {
            Write-Error "Failed to download MT5 setup file"
            exit 1
          }
          Write-Output "Download completed successfully"
        shell: powershell
        timeout-minutes: 30

      - name: Install MetaTrader 5
        if: steps.mt5-cache.outputs.cache-hit != 'true'
        run: |
          Write-Output "Installing MetaTrader 5 to $env:MT5_INSTALL_PATH..."
          & "mt5setup.exe" /invisible /u /target:"$env:MT5_INSTALL_PATH" | Out-Null
          
          Start-Sleep -Seconds 30
          
          if (-Not (Test-Path "$env:MT5_TERMINAL_EXE")) {
            Write-Error "MT5 installation failed - terminal64.exe not found"
            exit 1
          }
          Write-Output "MetaTrader 5 installed successfully"
        shell: powershell
        timeout-minutes: 60

      - name: Verify MetaTrader 5 Installation
        run: |
          if (Test-Path "$env:MT5_TERMINAL_EXE") {
            Write-Output "✓ MT5 Terminal executable found"
          } else {
            Write-Error "MT5 Terminal executable not found at $env:MT5_TERMINAL_EXE"
            exit 1
          }
        shell: powershell

      - name: Prepare Backtest Configuration
        run: |
          Write-Output "Preparing backtest configuration..."
          $configPath = "backtest_config.ini"
          
          if (-Not (Test-Path $configPath)) {
            Write-Error "Configuration file not found"
            exit 1
          }
          
          $destPath = "$env:MT5_INSTALL_PATH\backtest_config.ini"
          Copy-Item -Path $configPath -Destination $destPath -Force
          Write-Output "Configuration file prepared at $destPath"
        shell: powershell

      - name: Run Backtest
        run: |
          Write-Output "Starting backtest with GrokMurphy_Elite.ex5..."
          Write-Output "Configuration:"
          Write-Output "  Symbol: XAUUSD"
          Write-Output "  Period: H1"
          Write-Output "  FromDate: 2025.01.01"
          Write-Output "  ToDate: 2026.03.08"
          Write-Output ""
          
          & "$env:MT5_TERMINAL_EXE" /config:backtest_config.ini /exit 2>&1 | Tee-Object -FilePath backtest_output.log
          
          Write-Output "Backtest process completed"
        shell: powershell
        timeout-minutes: 90

      - name: Verify Backtest Results
        run: |
          Write-Output "Checking for backtest results..."
          
          if (Test-Path "$env:REPORT_PATH") {
            $fileSize = (Get-Item "$env:REPORT_PATH").Length
            Write-Output "✓ Report file found: $env:REPORT_PATH"
            Write-Output "  File size: $fileSize bytes"
            
            if ($fileSize -lt 1000) {
              Write-Warning "Report file is very small, backtest may have had issues"
            }
          } else {
            Write-Warning "Report file not found at $env:REPORT_PATH"
            exit 1
          }
        shell: powershell

      - name: Upload Backtest Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: GrokMurphy-Backtest-Report
          path: ${{ env.REPORT_PATH }}
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Backtest Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Backtest-Logs
          path: backtest_output.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Report Status
        if: always()
        run: |
          Write-Output "═══════════════════════════════════════"
          Write-Output "  BACKTEST EXECUTION SUMMARY"
          Write-Output "═══════════════════════════════════════"
          
          if (Test-Path "$env:REPORT_PATH") {
            Write-Output "✓ Status: SUCCESS"
            Write-Output "✓ Report generated: $env:REPORT_PATH"
          } else {
            Write-Output "✗ Status: FAILED"
            Write-Output "✗ No report file generated"
          }
          
          Write-Output "═══════════════════════════════════════"
        shell: powershell
